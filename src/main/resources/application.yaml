spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      
  application:
    name: storeyes-coffee

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://15.216.37.183/realms/storeyes}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://15.216.37.183/realms/storeyes/protocol/openid-connect/certs}
          audience: ${KEYCLOAK_AUDIENCE:storeyes-mobile}

  # Outbound email (Gmail). Do not put the app password here — use SPRING_MAIL_PASSWORD (env / IDE / server).
  mail:
    host: smtp.gmail.com
    port: 587
    username: storeyes.morocco@gmail.com
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

app:
  password-reset:
    pepper: ${PASSWORD_RESET_PEPPER:storeyes-dev-pepper-change-in-production}
    code-ttl-minutes: ${PASSWORD_RESET_CODE_TTL_MINUTES:15}
    reset-token-ttl-minutes: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:30}
    from-address: storeyes.morocco@gmail.com
  # Keycloak Admin REST (client_credentials) — required for POST /auth/password-reset/complete.
  # In Keycloak: create a confidential client, enable "Client authentication", enable Service account roles,
  # assign realm-management roles (e.g. manage-users) on the realm that holds your app users.
  keycloak-admin:
    enabled: ${KEYCLOAK_ADMIN_ENABLED:true}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:storeyes-mobile}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
    # Realm where the client lives (token endpoint realm).
    auth-realm: ${KEYCLOAK_ADMIN_AUTH_REALM:storeyes}
    # Realm whose users receive password resets (Admin API .../admin/realms/{users-realm}/users/...).
    # Leave empty to use the realm from spring.security.oauth2.resourceserver.jwt.issuer-uri.
    users-realm: ${KEYCLOAK_ADMIN_USERS_REALM:storeyes}
    # Optional: Keycloak base URL if it differs from the host in issuer-uri (no trailing slash).
    server-url: ${KEYCLOAK_ADMIN_SERVER_URL:http://15.216.37.183}

logging:
  level:
    root: INFO
    io.storeyes: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

server:
  port: ${SERVER_PORT:8443}
  ssl:
    enabled: ${SSL_ENABLED:true}
    key-store: ${SSL_KEYSTORE_PATH:file:keystore.p12}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:sahtout@2026}
    key-store-type: ${SSL_KEYSTORE_TYPE:PKCS12}
    key-alias: ${SSL_KEY_ALIAS:storeyes-blue}
    key-password: ${SSL_KEYSTORE_PASSWORD:sahtout@2026}
  http:
    port: ${HTTP_PORT:8080}

# AWS S3 Configuration
aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:storeyes-documents}
    region: ${AWS_S3_REGION:eu-south-2}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
